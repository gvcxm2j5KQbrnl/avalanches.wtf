!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="Blackjack" />
  <meta property="og:description" content="Blackjack">
  <meta name="theme-color" content="#101010">
  <title>BlackJack</title>

  <link rel="icon" type="image/png" href="https://avalanches.wtf/assets/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="https://avalanches.wtf/assets/favicon.svg" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    html, body {
      background: #101010 !important;
      color: #f2f2f2 !important;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      width: 100%;
      font-family: 'Inter', Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    .home-layout {
      background: #101010 !important;
      color: #f2f2f2 !important;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 18vh;
    }

    .typing {
      font-size: 46px;
      font-weight: 700;
      margin: 0 auto 10px;
      border-right: 3px solid #a78bfa;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      display: inline-block;
      background: linear-gradient(90deg, #a78bfa, #f472b6) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      background-size: 300% 100%;
      animation: typing 2s steps(9) forwards, 
                 blink 0.5s step-end infinite alternate, 
                 gradient-animation 4s linear infinite;
    }

    .subtitle {
      font-size: 1.35rem;
      opacity: 0.75;
      margin-bottom: 1.8rem;
    }

    .under-construction {
      font-size: 1.1rem;
      letter-spacing: 4px;
      font-weight: 500;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    .soon-btn {
      display: inline-block;
      background: #ffffff;
      color: #101010;
      padding: 14px 36px;
      border-radius: 9999px;
      font-size: 1.25rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .soon-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
    }

    footer {
      position: absolute;
      bottom: 2rem;
      color: #9ca3af;
      font-size: 13px;
      margin-top: auto;
    }

    @keyframes typing { 
      from { width: 0; } 
      to { width: 8.2ch; }
    }
    @keyframes blink { 
      50% { border-color: transparent; } 
    }
    @keyframes gradient-animation {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
      100% { background-position: 0% 0%; }
    }
  </style>
</head>
<body class="home-layout">
  <div class="container">
    <h1 class="typing">Blackjack</h1>
    <p class="subtitle">hold your horses people.</p>
    
    <div class="under-construction">UNDER CONSTRUCTION</div>
    
    <a href="https://github.com/gvcxm2j5KQbrnl/BlackJack" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="soon-btn">soon™</a>
  </div>

  <footer>
    © <span id="year"></span> avalanches.wtf
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
