<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="BlackJack" />
  <meta property="og:type" content="website" />
  <meta property="og:description" content="Blackjack">
  <meta name="theme-color" content="#101010">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BlackJack</title>

  <link rel="icon" type="image/png" href="https://avalanches.wtf/assets/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="https://avalanches.wtf/assets/favicon.svg" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #101010;
      color: #ffffff;
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 4.5rem;
      margin: 0 0 0.5rem 0;
      letter-spacing: -2px;
    }

    .subtitle {
      font-size: 1.3rem;
      opacity: 0.7;
      margin-bottom: 3rem;
    }

    .coming-soon {
      font-size: 1.1rem;
      letter-spacing: 3px;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    .play-btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: #ffffff;
      color: #101010;
      font-size: 1.3rem;
      font-weight: 500;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .play-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.9rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">BlackJack</h1>
    <p class="subtitle">hold your horses people.</p>
    
    <div class="coming-soon">UNDER CONSTRUCTION</div>
    
    <a href="#" class="play-btn">SOON™</a>
  </div>

  <footer>© {{ "now" | date: "%Y" }} avalanches.wtf</footer>

  <script>
    const titleText = "BlackJack";
    let index = 0;
    const titleEl = document.getElementById('title');

    function typeTitle() {
      titleEl.textContent = titleText.slice(0, index + 1);
      index++;
      if (index < titleText.length) {
        setTimeout(typeTitle, 130);
      } else {
        setTimeout(() => {
          index = 0;
          typeTitle();
        }, 2500);
      }
    }
    typeTitle();
  </script>
</body>
</html>
